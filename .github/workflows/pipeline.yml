name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest test_app.py -v

      - name: Build Docker image
        run: docker build -t myflaskapp:${{ github.sha }} .

      - name: Simulate deploy
        run: echo "Deploying image myflaskapp:${{ github.sha }} to server..."
        env:
          FAKE_API_KEY: ${{ secrets.FAKE_API_KEY }}